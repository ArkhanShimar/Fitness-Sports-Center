<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#D4BC05" />
    <meta
      name="description"
      content="Fitness Sports Center - Train with the best coaches. Powered by FitLife Fitness."
    />
    <title>Fitness Sports Center - Train with the Best Coaches</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- Force scroll to top on page load -->
    <script>
      // Override scroll restoration and force scroll to top immediately
      if ('scrollRestoration' in window.history) {
        window.history.scrollRestoration = 'manual';
      }
      
      // Force scroll to top immediately
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;
    </script>
  </body>
</html>
